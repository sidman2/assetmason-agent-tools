name: Publish AssetMason Preview

on:
  workflow_dispatch:

concurrency:
  group: publish-assetmason-preview
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-preview
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Verify checkout state
        run: |
          set -euo pipefail
          test -z "$(git status --short)"
          git rev-parse --abbrev-ref HEAD
          git rev-parse HEAD
          git rev-parse origin/main
          git merge-base --is-ancestor 9f541a66a7e2776da73f733faeeca044d8783726 HEAD

      - name: Install dependencies
        run: npm ci

      - name: Validate repo
        run: |
          npm run typecheck
          npm test
          npm run build
          npm run pack:dry-run

      - name: Validate package manifests
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const read = (path) => JSON.parse(fs.readFileSync(path, 'utf8'));
          const resourcePlan = read('packages/assetmason-resource-plan/package.json');
          const cli = read('packages/assetmason-cli/package.json');
          const expect = (actual, expected, label) => {
            if (actual !== expected) {
              throw new Error(`${label}: expected ${expected}, got ${actual}`);
            }
          };
          expect(resourcePlan.name, 'assetmason-resource-plan', 'resource plan name');
          expect(resourcePlan.version, '0.1.0-preview.0', 'resource plan version');
          expect(resourcePlan.publishConfig?.tag, 'preview', 'resource plan tag');
          expect(resourcePlan.publishConfig?.access, 'public', 'resource plan access');
          expect(resourcePlan.repository?.directory, 'packages/assetmason-resource-plan', 'resource plan repository.directory');
          expect(cli.name, 'assetmason-cli', 'cli name');
          expect(cli.version, '0.1.0-preview.0', 'cli version');
          expect(cli.publishConfig?.tag, 'preview', 'cli tag');
          expect(cli.publishConfig?.access, 'public', 'cli access');
          expect(cli.repository?.directory, 'packages/assetmason-cli', 'cli repository.directory');
          expect(cli.dependencies?.['assetmason-resource-plan'], '0.1.0-preview.0', 'cli dependency');
          NODE

      - name: Verify versions are unpublished
        run: |
          set -euo pipefail
          npm view assetmason-resource-plan@0.1.0-preview.0 version >/dev/null 2>&1 && {
            echo "assetmason-resource-plan@0.1.0-preview.0 already exists; refusing to republish."
            exit 1
          }
          npm view assetmason-cli@0.1.0-preview.0 version >/dev/null 2>&1 && {
            echo "assetmason-cli@0.1.0-preview.0 already exists; refusing to republish."
            exit 1
          }

      - name: Capture pack manifests
        run: |
          npm pack --workspace assetmason-resource-plan --dry-run --json | tee resource-plan-pack.json
          npm pack --workspace assetmason-cli --dry-run --json | tee cli-pack.json

      - name: Publish resource plan
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: |
          set -euo pipefail
          npm publish --workspace assetmason-resource-plan --access public --tag preview --provenance
          npm view assetmason-resource-plan@0.1.0-preview.0 name version dist-tags repository license engines --json
          npm view assetmason-resource-plan dist-tags --json

      - name: Publish cli
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: |
          set -euo pipefail
          npm publish --workspace assetmason-cli --access public --tag preview --provenance
          npm view assetmason-cli@0.1.0-preview.0 name version dist-tags repository license engines bin dependencies --json
          npm view assetmason-cli dist-tags --json

      - name: Public smoke tests
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          npm_config_cache: /tmp/npm-cache
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          npm init -y >/dev/null
          npx -y assetmason-cli@preview --help
          npx -y assetmason-cli@preview list-scenarios
          npx -y assetmason-cli@preview check --scenario auth-redirect-bug --format json
          npx -y assetmason-cli@preview plan --scenario auth-redirect-bug --format json
          npx -y assetmason-cli@preview scan --root . --format markdown
          npx -y assetmason-cli@preview lock --scenario auth-redirect-bug --format json
          npx -y assetmason-cli@preview handoff --scenario auth-redirect-bug

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: assetmason-preview-release-evidence
          path: |
            resource-plan-pack.json
            cli-pack.json
