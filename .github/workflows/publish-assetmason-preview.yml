name: Publish AssetMason Preview

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type publish-preview to continue
        required: true
        type: string

concurrency:
  group: publish-assetmason-preview
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-preview
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install supported npm
        run: npm install --global "npm@>=11.5.1 <12"

      - name: Verify release tooling
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          node -e "
            const [major, minor, patch] = process.versions.node.split('.').map(Number);
            if (
              major < 22 ||
              (major === 22 && minor < 14)
            ) {
              throw new Error('Trusted publishing requires Node 22.14.0 or newer.');
            }
          "
          npm --version | node -e "
            let value = '';
            process.stdin.on('data', chunk => value += chunk);
            process.stdin.on('end', () => {
              const [major, minor, patch] = value.trim().split('.').map(Number);
              if (
                major < 11 ||
                (major === 11 && minor < 5) ||
                (major === 11 && minor === 5 && patch < 1)
              ) {
                throw new Error('Trusted publishing requires npm 11.5.1 or newer.');
              }
            });
          "

      - name: Verify checkout state
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirm }}" = "publish-preview"
          test -z "$(git status --short)"
          git rev-parse --abbrev-ref HEAD
          git rev-parse HEAD
          git rev-parse origin/main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
          git merge-base --is-ancestor a7c74c9a82ada62c8a753f0e7e32f958dbe4e3f8 HEAD

      - name: Install dependencies
        run: npm ci

      - name: Validate repo
        run: npm run verify:public

      - name: Validate package manifests
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const read = (path) => JSON.parse(fs.readFileSync(path, 'utf8'));
          const resourcePlan = read('packages/agent-resource-plan/package.json');
          const executionProfile = read('packages/agent-execution-profile/package.json');
          const cli = read('packages/assetmason-cli/package.json');
          const expect = (actual, expected, label) => {
            if (actual !== expected) {
              throw new Error(`${label}: expected ${expected}, got ${actual}`);
            }
          };
          expect(resourcePlan.name, 'agent-resource-plan', 'resource plan name');
          expect(resourcePlan.version, '0.1.0-preview.1', 'resource plan version');
          expect(resourcePlan.publishConfig?.tag, 'preview', 'resource plan tag');
          expect(resourcePlan.publishConfig?.access, 'public', 'resource plan access');
          expect(resourcePlan.repository?.directory, 'packages/agent-resource-plan', 'resource plan repository.directory');
          expect(executionProfile.name, 'agent-execution-profile', 'execution profile name');
          expect(executionProfile.version, '0.1.0-preview.1', 'execution profile version');
          expect(executionProfile.publishConfig?.tag, 'preview', 'execution profile tag');
          expect(executionProfile.publishConfig?.access, 'public', 'execution profile access');
          expect(executionProfile.repository?.directory, 'packages/agent-execution-profile', 'execution profile repository.directory');
          expect(cli.name, 'assetmason-cli', 'cli name');
          expect(cli.version, '0.1.0-preview.1', 'cli version');
          expect(cli.publishConfig?.tag, 'preview', 'cli tag');
          expect(cli.publishConfig?.access, 'public', 'cli access');
          expect(cli.repository?.directory, 'packages/assetmason-cli', 'cli repository.directory');
          expect(cli.dependencies?.['agent-execution-profile'], '0.1.0-preview.1', 'cli execution-profile dependency');
          expect(cli.dependencies?.['agent-resource-plan'], '0.1.0-preview.1', 'cli dependency');
          NODE

      - name: Verify versions are unpublished
        shell: bash
        run: |
          set -euo pipefail
          npm view agent-resource-plan@0.1.0-preview.1 version >/dev/null 2>&1 && {
            echo "agent-resource-plan@0.1.0-preview.1 already exists; refusing to republish."
            exit 1
          }
          npm view agent-execution-profile@0.1.0-preview.1 version >/dev/null 2>&1 && {
            echo "agent-execution-profile@0.1.0-preview.1 already exists; refusing to republish."
            exit 1
          }
          npm view assetmason-cli@0.1.0-preview.1 version >/dev/null 2>&1 && {
            echo "assetmason-cli@0.1.0-preview.1 already exists; refusing to republish."
            exit 1
          }

      - name: Capture pack manifests
        run: |
          npm pack --workspace agent-resource-plan --dry-run --json | tee resource-plan-pack.json
          npm pack --workspace agent-execution-profile --dry-run --json | tee execution-profile-pack.json
          npm pack --workspace assetmason-cli --dry-run --json | tee cli-pack.json

      - name: Publish resource plan
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        shell: bash
        run: |
          set -euo pipefail
          npm publish --workspace agent-resource-plan --access public --tag preview --provenance
          npm view agent-resource-plan@0.1.0-preview.1 name version dist-tags repository license engines --json
          npm view agent-resource-plan dist-tags --json

      - name: Publish execution profile
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        shell: bash
        run: |
          set -euo pipefail
          npm publish --workspace agent-execution-profile --access public --tag preview --provenance
          npm view agent-execution-profile@0.1.0-preview.1 name version dist-tags repository license engines --json
          npm view agent-execution-profile dist-tags --json

      - name: Publish cli
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        shell: bash
        run: |
          set -euo pipefail
          npm publish --workspace assetmason-cli --access public --tag preview --provenance
          npm view assetmason-cli@0.1.0-preview.1 name version dist-tags repository license engines bin dependencies --json
          npm view assetmason-cli dist-tags --json

      - name: Public smoke tests
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          npm_config_cache: /tmp/npm-cache
        shell: bash
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          npm init -y >/dev/null
          npx -y assetmason-cli@preview --help
          npx -y assetmason-cli@preview list-scenarios
          npx -y assetmason-cli@preview check --scenario auth-redirect-bug --format json
          npx -y assetmason-cli@preview profile --scenario auth-redirect-bug --format json
          npx -y assetmason-cli@preview plan --scenario auth-redirect-bug --format json
          npx -y assetmason-cli@preview scan --root . --format markdown
          npx -y assetmason-cli@preview lock --scenario auth-redirect-bug --format json
          npx -y assetmason-cli@preview profile-lock --scenario auth-redirect-bug --format json
          npx -y assetmason-cli@preview export --scenario auth-redirect-bug --format markdown
          npx -y assetmason-cli@preview handoff --scenario auth-redirect-bug

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: assetmason-preview-release-evidence
          path: |
            resource-plan-pack.json
            execution-profile-pack.json
            cli-pack.json
